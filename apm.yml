name: lfan-global-toolkit
version: 1.0.0
compilation:
  target:
    - cursor
    - claude
dependencies:
  apm:
  - fantasy-cc/context-harness
  - obra/superpowers
  mcp:
  - name: sequential-thinking
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-sequential-thinking'
  - name: github-mcp
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-github'
  - name: playwright
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@anthropic-ai/mcp-server-playwright'

  - name: context7
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@upstash/context7-mcp@latest'

  - name: nitan-mcp
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@nitansde/mcp@latest'
