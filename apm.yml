name: lfan-global-toolkit
version: 1.0.0
compilation:
  target: all
dependencies:
  apm:
  - path: ./project-init-iterate
    alias: project-init-iterate
  - obra/superpowers
  mcp:
  - name: sequential-thinking
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-sequential-thinking'
  - name: github-mcp
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-github'
  - name: playwright
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@anthropic-ai/mcp-server-playwright'
